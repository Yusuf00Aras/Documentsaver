<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📄</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Documentsaver - personal document assistant for PDF management and analysis" />
    <meta name="theme-color" content="#2563eb" />
    <title>Documentsaver</title>
    <style>
      :root {
        --bg-base: #f0f4f8;
        --bg-surface: #ffffff;
        --bg-surface-2: #f8fafc;
        --sidebar-bg: #1e3a5f;
        --sidebar-text: #e2e8f0;
        --sidebar-hover: rgba(255,255,255,0.07);
        --sidebar-active: #2563eb;
        --topbar-bg: rgba(255,255,255,0.97);
        --border: #e2e8f0;
        --border-light: rgba(226,232,240,0.6);
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --accent-light: #eff6ff;
        --accent-medium: #dbeafe;
        --danger: #dc2626;
        --danger-light: #fef2f2;
        --shadow-sm: 0 1px 3px rgba(15,23,42,0.07);
        --shadow-md: 0 4px 14px rgba(15,23,42,0.08);
        --shadow-lg: 0 12px 36px rgba(15,23,42,0.10);
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --bg-base: #0f172a;
          --bg-surface: #1e293b;
          --bg-surface-2: #162234;
          --sidebar-bg: #080e1c;
          --sidebar-text: #cbd5e1;
          --sidebar-hover: rgba(255,255,255,0.06);
          --sidebar-active: #3b82f6;
          --topbar-bg: rgba(30,41,59,0.98);
          --border: #334155;
          --border-light: rgba(51,65,85,0.6);
          --text-primary: #f1f5f9;
          --text-secondary: #94a3b8;
          --text-muted: #64748b;
          --accent: #3b82f6;
          --accent-hover: #60a5fa;
          --accent-light: rgba(59,130,246,0.12);
          --accent-medium: rgba(59,130,246,0.22);
          --danger: #ef4444;
          --danger-light: rgba(239,68,68,0.12);
          --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
          --shadow-md: 0 4px 14px rgba(0,0,0,0.3);
          --shadow-lg: 0 12px 36px rgba(0,0,0,0.45);
        }
      }

      :root[data-theme="dark"] {
        --bg-base: #0f172a;
        --bg-surface: #1e293b;
        --bg-surface-2: #162234;
        --sidebar-bg: #080e1c;
        --sidebar-text: #cbd5e1;
        --sidebar-hover: rgba(255,255,255,0.06);
        --sidebar-active: #3b82f6;
        --topbar-bg: rgba(30,41,59,0.98);
        --border: #334155;
        --border-light: rgba(51,65,85,0.6);
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --accent: #3b82f6;
        --accent-hover: #60a5fa;
        --accent-light: rgba(59,130,246,0.12);
        --accent-medium: rgba(59,130,246,0.22);
        --danger: #ef4444;
        --danger-light: rgba(239,68,68,0.12);
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
        --shadow-md: 0 4px 14px rgba(0,0,0,0.3);
        --shadow-lg: 0 12px 36px rgba(0,0,0,0.45);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      html, body, #App {
        width: 100%;
        height: 100%;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Trebuchet MS', sans-serif;
        background: var(--bg-base);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
      }
      @supports (height: 100dvh) {
        html, body, #App {
          height: 100dvh;
        }
      }
    </style>
  </head>
  <body>
    <div id="App"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
